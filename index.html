<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yortur Game</title>

<style>
body {
  margin:0;
  overflow:hidden;
  background:#1b3a2f;
  font-family:Arial, sans-serif;
  color:white;
}

/* UI */
#ui {
  position:absolute;
  top:10px;
  left:10px;
  z-index:10;
}

button {
  padding:8px 12px;
  border:none;
  background:#d4af37;
  color:black;
  cursor:pointer;
  margin-right:5px;
}

/* Player */
#player {
  position:absolute;
  width:40px;
  height:40px;
  background:#d4af37;
  border-radius:50%;
  left:50%;
  top:50%;
}

/* Mobile controls */
#controls {
  position:absolute;
  bottom:20px;
  width:100%;
  display:flex;
  justify-content:center;
  gap:20px;
}

.control-btn {
  width:60px;
  height:60px;
  background:rgba(255,255,255,0.2);
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
}
</style>
</head>

<body>

<div id="ui">
  <button onclick="setLang('en')">EN</button>
  <button onclick="setLang('es')">ES</button>
  <div id="text"></div>
</div>

<div id="player"></div>

<div id="controls">
  <div class="control-btn" ontouchstart="move('left')">⬅️</div>
  <div class="control-btn" ontouchstart="move('up')">⬆️</div>
  <div class="control-btn" ontouchstart="move('down')">⬇️</div>
  <div class="control-btn" ontouchstart="move('right')">➡️</div>
</div>

<script>
let player = document.getElementById("player");
let x = window.innerWidth / 2;
let y = window.innerHeight / 2;
let speed = 20;

/* =========================
   LANGUAGE SYSTEM (AUTO)
========================= */

let lang = detectLanguage();

function detectLanguage(){
  // 1. saved preference
  const saved = localStorage.getItem("lang");
  if(saved) return saved;

  // 2. URL (Wix tabs /es /en)
  if(window.location.href.includes("/es")) return "es";
  if(window.location.href.includes("/en")) return "en";

  // 3. browser language
  if(navigator.language.startsWith("es")) return "es";

  // default
  return "en";
}

function setLang(l){
  lang = l;
  localStorage.setItem("lang", l);
  updateText();
}

/* =========================
   TEXTS
========================= */

const TEXTS = {
  en: {
    move: "Move the musician"
  },
  es: {
    move: "Mueve al músico"
  }
};

function updateText(){
  document.getElementById("text").innerText = TEXTS[lang].move;
}

/* =========================
   MOVEMENT
========================= */

function move(dir){
  if(dir === "left") x -= speed;
  if(dir === "right") x += speed;
  if(dir === "up") y -= speed;
  if(dir === "down") y += speed;

  player.style.left = x + "px";
  player.style.top = y + "px";
}

/* =========================
   KEYBOARD
========================= */

document.addEventListener("keydown", e => {
  if(e.key === "ArrowLeft") move("left");
  if(e.key === "ArrowRight") move("right");
  if(e.key === "ArrowUp") move("up");
  if(e.key === "ArrowDown") move("down");
});

/* =========================
   MOBILE SAFARI FIX
========================= */

document.addEventListener("touchmove", function(e){
  e.preventDefault();
}, { passive:false });

/* INIT */
updateText();
</script>

</body>
</html>
